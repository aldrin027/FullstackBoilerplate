
services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - '3000:5173'
    volumes:
      - /app/node_modules
      - ./client:/app

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001'
    depends_on:
      - database
    environment:
      - MONGO_URI=mongodb://database:27017/mydb
    volumes:
      - /app/node_modules
      - ./server:/app

  database:
    image: mongodb/mongodb-community-server
    ports:
      - '27017:27017'